name: Chap
options:
  bundleIdPrefix: com.mingyupark
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

targets:
  Chap:
    type: application
    platform: macOS
    sources:
      - path: Sources/Chap
      - path: Sources/ChapCore
    resources:
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mingyupark.Chap
        MARKETING_VERSION: "2.2.9"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_IDENTITY: "-"
        INFOPLIST_KEY_LSUIElement: true
        INFOPLIST_KEY_CFBundleDisplayName: Chap
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 milv0 & hunsy9"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"

  ChapTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/ChapCoreTests
    dependencies:
      - target: Chap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mingyupark.ChapTests
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"

schemes:
  Chap:
    build:
      targets:
        Chap: all
        ChapTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ChapTests
